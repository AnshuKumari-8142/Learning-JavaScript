<!doctype html>
<html>
<head>
    <title>JavaScript</title>
</head>
</html>
<body>
    <h1>Conditional Statement</h1>
    <script>
        let day = 3;
        switch(day){
            case 1:
               document.write("Monday");
            break;

            case 2:
                document.write("Tuesday");
            break;
            case 3:
                document.write("Wednesday");
            break;
            case 4:
                document.write("Thursday");
            break;
            default:
                document.write("Invalid Day");

        }
    </script>
</body>
</html>
