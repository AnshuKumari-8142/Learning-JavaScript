<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>While Loop</h1>
    <script>
        let a = 5;
        while(a<=15){
            document.write("Numbers are :", a + "<br>")
            a++;
        }
    </script>
    
</body>
</html>
