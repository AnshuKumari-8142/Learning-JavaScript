<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>For Loop </h2>
    <script>
        for(let a = 1; a<=10; a++){
            let b = 2;
            let c = a*b;
            document.write(c + "<br>")
        }
    </script>
</body>
</html>
