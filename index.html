<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock & Dark Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Theme Toggle Button -->
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>

        <!-- Clock Display -->
        <div id="clock">00:00:00</div>
        
        <!-- Date Display -->
        <div id="date-display">-- -- ----</div>
        
        <!-- Format Toggle -->
        <button id="format-toggle" class="format-btn">Switch to 24h format</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
